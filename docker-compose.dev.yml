services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nihongo
      POSTGRES_USER: nihongo
      POSTGRES_PASSWORD: nihongo_dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nihongo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
